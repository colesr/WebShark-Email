<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebSharkEmail </title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased h-screen flex flex-col">

    <!-- Header / Navbar -->
    <header class="bg-white border-b border-slate-200 px-6 py-4 flex items-center justify-between shrink-0">
        <div class="flex items-center space-x-3">
            <div class="bg-indigo-600 text-white p-2 rounded-xl shadow-md shadow-indigo-100">
                <i class="fa-solid fa-envelope-open-text text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-bold tracking-tight text-slate-900">InfiniteInbox</h1>
                <p class="text-xs text-slate-500 font-medium">Free, unlimited temporary emails</p>
            </div>
        </div>
        <div class="flex items-center space-x-4">
            <span class="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-100 text-emerald-800">
                <span class="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span> Service Active
            </span>
        </div>
    </header>

    <!-- Main Workspace -->
    <div class="flex flex-1 overflow-hidden">

        <!-- Sidebar: Inbox Manager -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shrink-0">
            <!-- Generator Tool -->
            <div class="p-4 border-b border-slate-100 space-y-3">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400">Create New Inbox</label>
                <div class="flex gap-2">
                    <input type="text" id="custom-prefix" placeholder="custom-name" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
                    <span class="text-slate-400 self-center text-sm">@infin.io</span>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="createNewInbox(true)" class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium text-xs py-2 px-3 rounded-lg transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-plus"></i> Create
                    </button>
                    <button onclick="createNewInbox(false)" class="bg-slate-100 hover:bg-slate-200 text-slate-700 font-medium text-xs py-2 px-3 rounded-lg transition flex items-center justify-center gap-1.5 cursor-pointer">
                        <i class="fa-solid fa-shuffle"></i> Random
                    </button>
                </div>
            </div>

            <!-- Inbox Search -->
            <div class="p-4 border-b border-slate-100">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 mb-2">Search Inboxes</label>
                <input type="text" id="inbox-search" placeholder="Search by address..." class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500">
            </div>

            <!-- Inboxes List -->
            <div class="flex-1 overflow-y-auto p-3 space-y-1">
                <label class="block text-xs font-semibold uppercase tracking-wider text-slate-400 px-2 mb-2">Active Inboxes (<span id="inbox-count">0</span>)</label>
                <div id="inbox-list" class="space-y-1">
                    <!-- Dynamic Inboxes Inject Here -->
                </div>
            </div>
        </aside>

        <!-- Middle Column: Messages List -->
        <section class="w-96 bg-slate-50 border-r border-slate-200 flex flex-col shrink-0">
            <div class="p-4 bg-white border-b border-slate-200 flex items-center justify-between shrink-0">
                <h2 class="font-semibold text-slate-900" id="current-inbox-title">Select an Inbox</h2>
                <button onclick="refreshMessages()" class="text-slate-500 hover:text-indigo-600 transition p-1.5 hover:bg-slate-100 rounded-lg cursor-pointer" title="Refresh Feed">
                    <i class="fa-solid fa-arrows-rotate"></i>
                </button>
            </div>
            <div id="message-list" class="flex-1 overflow-y-auto p-3 space-y-2">
                <!-- Dynamic Message Cards Inject Here -->
                <div class="text-center py-12 text-slate-400">
                    <i class="fa-solid fa-tray text-3xl mb-2 block"></i>
                    <p class="text-sm">No inbox selected</p>
                </div>
            </div>
        </section>

        <!-- Right Column: Message Viewer -->
        <main class="flex-1 bg-white flex flex-col overflow-hidden">
            <div class="p-4 border-b border-slate-200 bg-slate-50">
                <h3 class="text-sm font-semibold text-slate-900 mb-3">Compose message</h3>
                <div class="grid grid-cols-1 gap-3">
                    <input id="compose-to" type="email" placeholder="To email address" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" list="contacts-datalist">
                    <datalist id="contacts-datalist"></datalist>
                    <input id="compose-subject" type="text" placeholder="Subject" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500" />
                    <textarea id="compose-body" rows="5" placeholder="Message body" class="w-full px-3 py-2 border border-slate-200 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"></textarea>
                    <div class="flex items-center justify-between gap-3">
                        <span id="send-status" class="text-xs text-slate-500">Ready to send</span>
                        <div class="flex gap-2">
                            <button onclick="simulateInbound()" id="inbound-button" class="bg-slate-100 hover:bg-slate-200 text-slate-700 text-xs font-semibold px-4 py-2 rounded-lg transition">Simulate inbound</button>
                            <button onclick="handleSendEmail()" id="send-button" class="bg-indigo-600 hover:bg-indigo-700 text-white text-xs font-semibold px-4 py-2 rounded-lg transition">Send</button>
                        </div>
                    </div>
                </div>
            </div>

            <div id="message-viewer" class="flex flex-col h-full items-center justify-center text-slate-400 p-8">
                <i class="fa-solid fa-paper-plane text-4xl mb-3"></i>
                <p class="text-lg font-medium">Select an email to read its contents</p>
            </div>
        </main>

    </div>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed bottom-4 right-4 z-50 flex flex-col-reverse space-y-3 pointer-events-none"></div>

    <!-- JavaScript logic -->
    <script>
        const WORKER_URL = 'https://webshark-email-send.cole-colesr-sam.workers.dev';

        const inboundTemplates = [
            {
                from: 'support@infin.io',
                subject: 'Welcome to your inbox',
                body: 'Your new inbox is live. This inbound email was delivered through the worker and stored in KV.',
            },
            {
                from: 'alerts@infin.io',
                subject: 'Security update for your account',
                body: 'We noticed a new login to your InfiniteInbox account. If you did not authorize this, change your password immediately.',
            },
            {
                from: 'newsletter@infin.io',
                subject: 'Monthly digest ready',
                body: 'Your temporary inbox is ready to receive messages. Check back now to review your first message.',
            },
        ];

        // State Store
        let inboxes = [];
        let activeInboxId = null;
        let activeMessageId = null;
        let searchTerm = ''; // For inbox search functionality
        let contacts = []; // For contact management/frequent recipients

        // Initialize with one default random inbox
        window.onload = async () => {
            await createNewInbox(false);
            loadContacts(); // Load contacts from localStorage
            showToast('Welcome to WebShark Email!', 'success');
        };

        function showToast(message, type = 'info') {
            // Remove any existing toast containers
            const existingContainer = document.getElementById('toast-container');
            if (existingContainer) {
                existingContainer.remove();
            }

            // Create toast container
            const container = document.createElement('div');
            container.id = 'toast-container';
            container.className = 'fixed bottom-4 right-4 z-50 flex flex-col-reverse space-y-3 sm:flex-col sm:space-y-2';

            // Create toast element
            const toast = document.createElement('div');
            toast.className = `flex w-full max-w-xs p-4 mb-4 rounded-lg shadow-lg ${getToastBackgroundColor(type)} ${getToastTextColor(type)} animate__animated animate__fadeInUp`;

            // Set icon based on type
            const iconMap = {
                'success': 'fa-check-circle',
                'error': 'fa-exclamation-triangle',
                'warning': 'fa-exclamation-circle',
                'info': 'fa-info-circle'
            };
            const icon = iconMap[type] || 'fa-info-circle';

            toast.innerHTML = `
                <div class="flex items-start">
                    <div class="flex-shrink-0">
                        <i class="fas ${icon} text-xl mr-3"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-sm font-medium">${message}</p>
                    </div>
                </div>
            `;

            // Add close button
            const closeButton = document.createElement('button');
            closeButton.innerHTML = '<i class="fas fa-times text-opacity-50 hover:text-opacity-75"></i>';
            closeButton.className = 'ml-4 flex-shrink-0 w-6 h-6 rounded-full hover:bg-gray-200 transition-colors';
            closeButton.onclick = () => {
                toast.remove();
                if (container.children.length === 0) {
                    container.remove();
                }
            };

            // Insert close button at the top right
            toast.querySelector('.flex-items-start').prepend(closeButton);

            // Add toast to container
            container.appendChild(toast);
            document.body.appendChild(container);

            // Auto-remove after 5 seconds
            setTimeout(() => {
                if (toast.parentElement) {
                    toast.remove();
                    if (container.children.length === 0) {
                        container.remove();
                    }
                }
            }, 5000);
        }

        function getToastBackgroundColor(type) {
            switch (type) {
                case 'success': return 'bg-green-100';
                case 'error': return 'bg-red-100';
                case 'warning': return 'bg-yellow-100';
                case 'info': return 'bg-blue-100';
                default: return 'bg-blue-100';
            }
        }

        function getToastTextColor(type) {
            switch (type) {
                case 'success': return 'text-green-800';
                case 'error': return 'text-red-800';
                case 'warning': return 'text-yellow-800';
                case 'info': return 'text-blue-800';
                default: return 'text-blue-800';
            }
        }

        function setStatus(message) {
            // This function is kept for backward compatibility but now uses toast
            showToast(message, 'info');
        }

        function setSendButton(enabled) {
            const button = document.getElementById('send-button');
            if (!button) return;
            button.disabled = !enabled;
            button.classList.toggle('opacity-50', !enabled);
        }

        // Contact Management Functions
        function loadContacts() {
            const savedContacts = localStorage.getItem('webshark-contacts');
            if (savedContacts) {
                try {
                    contacts = JSON.parse(savedContacts);
                } catch (e) {
                    console.warn('Failed to parse contacts from localStorage', e);
                    contacts = [];
                }
            }
            updateContactDatalist();
        }

        function saveContacts() {
            try {
                localStorage.setItem('webshark-contacts', JSON.stringify(contacts));
                updateContactDatalist();
            } catch (e) {
                console.warn('Failed to save contacts to localStorage', e);
            }
        }

        function addContact(email) {
            if (!email) return;

            // Normalize email for comparison
            const normalizedEmail = email.trim().toLowerCase();

            // Check if contact already exists
            const exists = contacts.some(contact => contact.email.toLowerCase() === normalizedEmail);
            if (!exists) {
                contacts.push({
                    email: email.trim(),
                    added: Date.now()
                });

                // Keep only the 50 most recent contacts
                if (contacts.length > 50) {
                    contacts.sort((a, b) => b.added - a.added);
                    contacts = contacts.slice(0, 50);
                }

                saveContacts();
                return true;
            }
            return false;
        }

        function updateContactDatalist() {
            const datalist = document.getElementById('contacts-datalist');
            if (!datalist) return;

            // Clear existing options
            datalist.innerHTML = '';

            // Add contact options
            contacts
                .sort((a, b) => b.added - a.added) // Sort by most recently added
                .slice(0, 20) // Limit to top 20 for performance
                .forEach(contact => {
                    const option = document.createElement('option');
                    option.value = contact.email;
                    datalist.appendChild(option);
                });
        }

        async function createNewInbox(isCustom) {
            let prefix = "";
            if (isCustom) {
                prefix = document.getElementById('custom-prefix').value.trim().toLowerCase().replace(/[^a-z0-9]/g, '');
                if (!prefix) {
                    showToast('Please enter a valid alphanumeric username prefix.', 'error');
                    return;
                }
                document.getElementById('custom-prefix').value = "";
            } else {
                prefix = Math.random().toString(36).substring(2, 10);
            }

            const emailAddress = `${prefix}@infin.io`;

            if (inboxes.some(i => i.address === emailAddress)) {
                showToast('This address is already managed locally.', 'error');
                return;
            }

            const newInbox = {
                id: Date.now().toString(),
                address: emailAddress,
                messages: [],
            };

            inboxes.unshift(newInbox);
            renderInboxes();
            await selectInbox(newInbox.id);
            showToast('New inbox created successfully!', 'success');
        }

        async function selectInbox(id) {
            activeInboxId = id;
            activeMessageId = null;
            renderInboxes();

            const current = inboxes.find(i => i.id === id);
            if (!current) return;

            document.getElementById('current-inbox-title').innerText = current.address;
            showToast(`Loading messages for ${current.address}...`, 'info');
            current.messages = await fetchMessages(current.address);
            renderMessages();
            renderMessageViewer();
        }

        async function fetchMessages(address) {
            try {
                const response = await fetch(`${WORKER_URL}/messages?address=${encodeURIComponent(address)}`);
                const data = await response.json();
                if (!response.ok) {
                    showToast(data.error || 'Unable to fetch messages', 'error');
                    return [];
                }
                showToast('Messages loaded successfully', 'success');
                return Array.isArray(data.messages) ? data.messages : [];
            } catch (error) {
                showToast('Failed to load messages: ' + error.message, 'error');
                return [];
            }
        }

        async function handleSendEmail() {
            const to = document.getElementById('compose-to').value.trim();
            const subject = document.getElementById('compose-subject').value.trim();
            const body = document.getElementById('compose-body').value.trim();

            if (!to || !subject || !body) {
                showToast('Enter a destination address, subject, and body.', 'error');
                return;
            }

            setSendButton(false);
            showToast('Sending message...', 'info');

            const result = await sendEmail(to, subject, body);
            if (result.success) {
                showToast('Message sent successfully!', 'success');

                // Add recipient to contacts if it's not already there
                addContact(to);

                if (to.toLowerCase().endsWith('@infin.io')) {
                    const inbox = inboxes.find(i => i.address.toLowerCase() === to.toLowerCase());
                    if (inbox && activeInboxId === inbox.id) {
                        await refreshMessages();
                    }
                }
                document.getElementById('compose-subject').value = '';
                document.getElementById('compose-body').value = '';
            } else {
                showToast('Send failed: ' + (result.error || 'Unknown error'), 'error');
            }

            setSendButton(true);
        }

        async function sendEmail(to, subject, body) {
            try {
                const response = await fetch(`${WORKER_URL}/send`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ to, subject, body }),
                });

                const data = await response.json();
                if (!response.ok) {
                    return { success: false, error: data.error || data.message || 'Send request failed' };
                }
                return { success: true, data };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        async function simulateInbound() {
            if (!activeInboxId) {
                showToast('Select an inbox before simulating inbound mail.', 'error');
                return;
            }

            const current = inboxes.find(i => i.id === activeInboxId);
            if (!current) {
                showToast('No active inbox selected.', 'error');
                return;
            }

            const template = inboundTemplates[Math.floor(Math.random() * inboundTemplates.length)];
            showToast('Simulating inbound message...', 'info');

            try {
                const response = await fetch(`${WORKER_URL}/inbound`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        to: current.address,
                        from: template.from,
                        subject: template.subject,
                        body: template.body,
                    }),
                });

                const data = await response.json();
                if (!response.ok) {
                    throw new Error(data.error || data.message || 'Inbound request failed');
                }

                showToast('Inbound message received!', 'success');
                current.messages = await fetchMessages(current.address);
                renderMessages();
                renderMessageViewer();
            } catch (error) {
                showToast('Inbound simulation failed: ' + error.message, 'error');
            } finally {
                setSendButton(true);
            }
        }

        // Render Sidebar Inboxes
        function renderInboxes() {
            const container = document.getElementById('inbox-list');
            const searchInput = document.getElementById('inbox-search');
            document.getElementById('inbox-count').innerText = inboxes.length;
            container.innerHTML = '';

            // Filter inboxes based on search term
            const filteredInboxes = inboxes.filter(inbox =>
                inbox.address.toLowerCase().includes(searchTerm.toLowerCase())
            );

            filteredInboxes.forEach(inbox => {
                const isActive = inbox.id === activeInboxId;
                container.innerHTML += `
                    <div onclick="selectInbox('${inbox.id}')" class="group flex items-center justify-between p-3 rounded-xl cursor-pointer transition ${isActive ? 'bg-indigo-50 border border-indigo-100 text-indigo-900 font-medium' : 'hover:bg-slate-50 text-slate-600'}">
                        <div class="flex items-center space-x-3 overflow-hidden">
                            <i class="fa-solid fa-circle-nodes text-xs ${isActive ? 'text-indigo-600' : 'text-slate-300'}"></i>
                            <span class="truncate text-sm">${inbox.address}</span>
                        </div>
                        <span class="bg-slate-200 text-slate-700 text-xs px-2 py-0.5 rounded-full font-bold group-hover:bg-indigo-200 group-hover:text-indigo-800 transition">
                            ${inbox.messages.length}
                        </span>
                    </div>
                `);
            });
        }

        // Render Message Feed for Active Inbox
        function renderMessages() {
            const container = document.getElementById('message-list');
            const current = inboxes.find(i => i.id === activeInboxId);

            if (!current || current.messages.length === 0) {
                container.innerHTML = `
                    <div class="text-center py-12 text-slate-400">
                        <i class="fa-solid fa-spinner animate-spin text-2xl mb-2 block text-indigo-500"></i>
                        <p class="text-xs">No messages in this inbox yet. Send one to yourself or refresh.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            current.messages.forEach(msg => {
                const isSelected = msg.id === activeMessageId;
                const isRead = msg.read === true;
                container.innerHTML += `
                    <div class="p-3.5 bg-white border rounded-xl shadow-xs cursor-pointer transition-all ${isSelected ? 'border-indigo-500 ring-2 ring-indigo-50' : 'border-slate-200 hover:border-slate-300'} flex flex-col">
                        <div class="flex justify-between items-start mb-2">
                            <div class="flex items-center space-x-2">
                                <span class="text-xs font-bold text-slate-900 truncate max-w-[60%]">${msg.from}</span>
                                {!isRead && `<span class="inline-block w-2 h-2 bg-blue-500 rounded-full"></span>`}
                            </div>
                            <span class="text-[10px] text-slate-400 font-medium">${msg.time}</span>
                        </div>
                        <h4 class="text-xs font-semibold text-slate-800 truncate mb-1 line-clamp-1 ${isRead ? 'text-slate-500' : 'text-slate-900'}">${msg.subject}</h4>
                        <p class="text-xs text-slate-400 line-clamp-2">${msg.body}</p>
                        <div class="mt-2 flex items-center space-x-2">
                            <button onclick="deleteMessage(event, '${msg.id}')" class="text-xs text-red-500 hover:text-red-700 hover:underline">
                                <i class="fa-solid fa-trash"></i> Delete
                            </button>
                            <button onclick="toggleReadStatus(event, '${msg.id}', ${isRead})" class="text-xs text-blue-500 hover:text-blue-700 hover:underline">
                                <i class="fa-solid fa-${isRead ? 'circle' : 'circle-check'}"></i> ${isRead ? 'Mark Unread' : 'Mark Read'}
                            </button>
                        </div>
                    </div>
                `;
            });
        }

        function selectMessage(msgId) {
            // Mark message as read when selected
            if (activeInboxId) {
                const current = inboxes.find(i => i.id === activeInboxId);
                if (current) {
                    const message = current.messages.find(m => m.id === msgId);
                    if (message && !message.read) {
                        message.read = true;
                        // Update the backend
                        fetch(`${WORKER_URL}/messages/${msgId}?address=${encodeURIComponent(current.address)}`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ read: true })
                        }).catch(err => console.warn('Failed to update read status:', err));
                    }
                }
            }

            activeMessageId = msgId;
            renderMessages();
            renderMessageViewer();
        }

        async function deleteMessage(event, messageId) {
            event.stopPropagation(); // Prevent triggering selectMessage
            if (!activeInboxId) return;

            if (!confirm('Are you sure you want to delete this message?')) {
                return;
            }

            const current = inboxes.find(i => i.id === activeInboxId);
            if (!current) return;

            try {
                const response = await fetch(`${WORKER_URL}/messages/${messageId}?address=${encodeURIComponent(current.address)}`, {
                    method: 'DELETE',
                });

                if (!response.ok) {
                    throw new Error('Failed to delete message');
                }

                // Remove from local state
                current.messages = current.messages.filter(msg => msg.id !== messageId);

                // If we deleted the currently selected message, clear selection
                if (activeMessageId === messageId) {
                    activeMessageId = null;
                }

                renderMessages();
                renderMessageViewer();
                showToast('Message deleted successfully', 'success');
            } catch (error) {
                showToast('Failed to delete message: ' + error.message, 'error');
            }
        }

        async function toggleReadStatus(event, messageId, currentReadStatus) {
            event.stopPropagation(); // Prevent triggering selectMessage
            if (!activeInboxId) return;

            const current = inboxes.find(i => i.id === activeInboxId);
            if (!current) return;

            const newReadStatus = !currentReadStatus;

            try {
                const response = await fetch(`${WORKER_URL}/messages/${messageId}?address=${encodeURIComponent(current.address)}`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ read: newReadStatus }),
                });

                if (!response.ok) {
                    throw new Error('Failed to update message status');
                }

                // Update local state
                const message = current.messages.find(msg => msg.id === messageId);
                if (message) {
                    message.read = newReadStatus;
                }

                renderMessages();
                renderMessageViewer();
                showToast(`Message marked as ${newReadStatus ? 'read' : 'unread'}`, 'success');
            } catch (error) {
                showToast('Failed to update message status: ' + error.message, 'error');
            }
        }

        function renderMessageViewer() {
            const container = document.getElementById('message-viewer');
            if (!activeInboxId || !activeMessageId) {
                container.className = 'flex-1 bg-white flex flex-col h-full items-center justify-center text-slate-400 p-8';
                container.innerHTML = `
                    <i class="fa-solid fa-paper-plane text-4xl mb-3"></i>
                    <p class="text-sm font-medium">Select an email to read its contents</p>
                `;
                return;
            }

            const inbox = inboxes.find(i => i.id === activeInboxId);
            const msg = inbox?.messages.find(m => m.id === activeMessageId);
            if (!msg) {
                setStatus('Selected message could not be found.');
                return;
            }

            container.className = 'flex-1 bg-white flex flex-col h-full overflow-hidden';
            container.innerHTML = `
                <div class="p-6 border-b border-slate-200 shrink-0">
                    <h3 class="text-lg font-bold text-slate-900 mb-3">${msg.subject}</h3>
                    <div class="flex items-center justify-between text-xs">
                        <div>
                            <span class="text-slate-400">From:</span> <strong class="text-slate-700">${msg.from}</strong>
                        </div>
                        <div class="text-slate-400 font-medium">Received at ${msg.time}</div>
                    </div>
                    <div class="mt-2 text-xs">
                        <span class="text-slate-400">To:</span> <span class="bg-slate-100 text-slate-600 px-1.5 py-0.5 rounded font-mono">${inbox.address}</span>
                    </div>
                </div>
                <div class="flex-1 p-6 overflow-y-auto bg-slate-50/50 text-sm leading-relaxed text-slate-700 font-mono whitespace-pre-line">
                    ${msg.body}
                </div>
            `;
        }

        async function refreshMessages() {
            if (!activeInboxId) return;
            const current = inboxes.find(i => i.id === activeInboxId);
            if (!current) return;

            showToast('Refreshing messages...', 'info');
            current.messages = await fetchMessages(current.address);
            renderMessages();
            renderMessageViewer();
        }

        // Search functionality
        document.addEventListener('DOMContentLoaded', () => {
            const searchInput = document.getElementById('inbox-search');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    searchTerm = e.target.value;
                    renderInboxes();
                });

                // Add clear button functionality
                searchInput.addEventListener('search', () => {
                    searchTerm = '';
                    renderInboxes();
                });
            }

            // Add autocomplete functionality to the "To" field
            const toInput = document.getElementById('compose-to');
            if (toInput) {
